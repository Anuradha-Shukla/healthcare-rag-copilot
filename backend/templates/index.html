<!DOCTYPE html>

<html>

<head>

<title>Healthcare RAG Copilot</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

height:100vh;

background:
linear-gradient(
135deg,
#0f172a,
#1e293b,
#0ea5e9
);

display:flex;

justify-content:center;

align-items:center;

}

.container{

width:700px;

background:white;

padding:40px;

border-radius:20px;

box-shadow:
0 15px 50px rgba(0,0,0,.25);

}

h1{

color:#0f172a;

text-align:center;

margin-bottom:10px;

}

.subtitle{

text-align:center;

color:#64748b;

margin-bottom:30px;

}

form{

display:flex;

gap:12px;

}

input{

flex:1;

padding:16px;

border-radius:12px;

border:1px solid #d1d5db;

font-size:16px;

}

input:focus{

outline:none;

border-color:#0ea5e9;

}

button{

padding:16px 28px;

border:none;

border-radius:12px;

cursor:pointer;

background:#0ea5e9;

color:white;

font-size:16px;

font-weight:bold;

}

button:hover{

transform:translateY(-2px);

}

.card{

margin-top:30px;

padding:18px;

background:#f8fafc;

border-radius:14px;

}

</style>

</head>

<body>

<div class="container">

<h1>🏥 Healthcare RAG Copilot</h1>

<p class="subtitle">

AI-powered Healthcare Report Assistant

</p>

<form
action="/ask"
method="GET"
>

<input
type="text"
name="question"
placeholder="Ask about Vitamin D, recommendations, diagnosis..."
required

>

<button type="submit">

Ask

</button>

</form>

<div class="card">

Examples:

<br><br>

• What is my Vitamin D level?

<br>

• Give recommendation

<br>

• Summarize report

</div>

</div>

</body>

</html>
